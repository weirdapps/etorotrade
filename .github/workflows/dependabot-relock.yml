name: Dependabot Auto-Relock

# Dependabot bumps pyproject.toml + poetry.lock but never runs
# scripts/dev/relock.sh, so the committed requirements-*-lock.txt exports go
# stale and the CI `lockfile sync` job fails on every Python-dependency PR.
# This job re-exports them from Dependabot's existing poetry.lock and pushes the
# result back to the PR branch, clearing the failure with no human intervention.
#
# Why pull_request_target: a `pull_request` run triggered by Dependabot gets a
# read-only token and no access to Actions secrets, so it can neither push nor
# reach PUSH_PAT. pull_request_target runs in the base-repo context (full token +
# secrets). It is gated to Dependabot-authored PRs, and relock only runs
# `poetry export` (--export-only: no `poetry lock` re-resolve, so Dependabot's
# transitive bumps are preserved) which reads metadata and never executes
# package code — so checking out the PR head here is safe.
#
# Pushing with PUSH_PAT (not GITHUB_TOKEN) is required so the commit re-triggers
# the CI workflows; GITHUB_TOKEN pushes are suppressed from triggering runs.

'on':
  pull_request_target:
    paths:
      - 'pyproject.toml'
      - 'poetry.lock'

permissions:
  contents: write

concurrency:
  group: dependabot-relock-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  relock:
    name: relock
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Checkout PR head (PAT so the push re-triggers CI)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.PUSH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263  # v1.4.2
        with:
          version: '2.4.0'
          plugins: 'poetry-plugin-export==1.10.0'

      - name: Re-export requirements from poetry.lock
        run: bash scripts/dev/relock.sh --export-only

      - name: Commit + push if exports drifted
        run: |
          if git diff --quiet -- requirements-lock.txt requirements-dev-lock.txt requirements-smoketest-lock.txt; then
            echo "Committed requirements exports already match poetry.lock — nothing to do."
            exit 0
          fi
          git config user.name "dependabot-relock[bot]"
          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git add requirements-lock.txt requirements-dev-lock.txt requirements-smoketest-lock.txt
          git commit -m "build: relock requirements exports for Dependabot bump

          Auto-generated by .github/workflows/dependabot-relock.yml — Dependabot
          updates pyproject.toml/poetry.lock but not the committed
          requirements-*-lock.txt exports; regenerated via
          scripts/dev/relock.sh --export-only so the lockfile-sync job passes."
          git push
