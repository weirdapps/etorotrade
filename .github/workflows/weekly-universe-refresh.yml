name: Weekly Universe Refresh

"on":
  schedule:
    # Sunday 21:00 UTC — runs 1h before daily-signals.yml at 22:00 UTC
    # so Monday's first signal pass already sees the fresh universe.
    - cron: '0 21 * * 0'
  workflow_dispatch:  # manual trigger

concurrency:
  group: weekly-universe-refresh
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  refresh-universe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # required to commit the refreshed CSV

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.PUSH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install requests
        run: |
          pip install --only-binary :all: --require-hashes -r requirements-universe-lock.txt

      - name: Run refresh script
        env:
          ETORO_API_KEY: ${{ secrets.ETORO_API_KEY }}
          ETORO_USER_KEY: ${{ secrets.ETORO_USER_KEY }}
        run: python scripts/refresh_etoro_universe.py

      - name: Check for changes
        id: git_diff
        run: |
          if git diff --quiet yahoofinance/input/etoro.csv yahoofinance/input/.universe-refresh-log.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No universe changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Universe changes detected; will commit."
          fi

      - name: Commit and push
        if: steps.git_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add yahoofinance/input/etoro.csv \
                  yahoofinance/input/.universe-refresh-log.json
          git commit -m "chore(universe): weekly refresh from eToro Asset Explorer

          Source: https://www.etoro.com/api/public/v1/instruments/discover
          Run via .github/workflows/weekly-universe-refresh.yml"
          git push
