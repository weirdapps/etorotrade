name: Weekly Backtest

on:
  schedule:
    # Run Sunday at 23:00 UTC (02:00 Athens Monday)
    # Results ready for Monday morning briefing
    - cron: '0 23 * * 0'
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: weekly-backtest
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PUSH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly backtest pipeline
        run: |
          echo "Running weekly backtest pipeline..."
          python scripts/run_weekly_backtest.py --ci
          echo "Backtest pipeline complete"

      - name: Validate backtest output
        run: |
          REPORT="yahoofinance/output/backtest_report.json"
          if [ ! -f "$REPORT" ]; then
            echo "ERROR: backtest_report.json not generated"
            exit 1
          fi
          SIZE=$(wc -c < "$REPORT")
          if [ "$SIZE" -lt 500 ]; then
            echo "ERROR: backtest_report.json is only $SIZE bytes (expected >500)"
            cat "$REPORT"
            exit 1
          fi
          echo "Backtest report validated: $SIZE bytes"
          python3 -c "
          import json
          with open('$REPORT') as f:
              r = json.load(f)
          h = r.get('headline', {})
          assert h.get('buy_count_t7') is not None, 'Missing buy_count_t7'
          print(f'BUY T+7: {h.get(\"buy_hit_rate_t7\")}% (n={h.get(\"buy_count_t7\")})')
          print(f'SELL T+7: {h.get(\"sell_hit_rate_t7\")}% (n={h.get(\"sell_count_t7\")})')
          "

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Commit backtest outputs
        run: |
          git add yahoofinance/output/backtest_results.csv || true
          git add yahoofinance/output/backtest_summary.csv || true
          git add yahoofinance/output/backtest_threshold_report.csv || true
          git add yahoofinance/output/backtest_report.json || true
          git add data/committee/action_log.jsonl || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COMMIT_DATE=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "Weekly backtest - $COMMIT_DATE

          - Signal hit rates updated
          - Threshold analysis refreshed

          Auto-generated by weekly-backtest workflow"

            PUSH_SUCCESS=false
            for i in 1 2 3; do
              echo "Push attempt $i..."
              if git pull --rebase origin master && git push; then
                PUSH_SUCCESS=true
                break
              fi
              echo "Attempt $i failed, retrying in 5 seconds..."
              sleep 5
            done
            if [ "$PUSH_SUCCESS" = false ]; then
              echo "ERROR: All push attempts failed."
              exit 1
            fi
            echo "Backtest results committed and pushed"
          fi

      - name: Upload backtest artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backtest-${{ github.run_id }}
          path: |
            yahoofinance/output/backtest_results.csv
            yahoofinance/output/backtest_summary.csv
            yahoofinance/output/backtest_threshold_report.csv
            yahoofinance/output/backtest_report.json
          retention-days: 90
