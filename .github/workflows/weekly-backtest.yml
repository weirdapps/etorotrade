name: Weekly Backtest

on:
  schedule:
    # Run Saturday at 23:00 UTC (02:00 Athens Sunday)
    # Avoids Sunday daily-signals (~5h, starts 22:00 UTC) overlap on shared eToro creds
    - cron: '0 23 * * 6'
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: weekly-backtest
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.PUSH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --only-binary :all: --upgrade pip
          pip install --only-binary :all: --require-hashes -r requirements.lock

      - name: Run weekly backtest pipeline
        run: |
          echo "Running weekly backtest pipeline..."
          python scripts/run_weekly_backtest.py --ci
          echo "Backtest pipeline complete"

      - name: Validate backtest output
        run: |
          REPORT="yahoofinance/output/backtest_report.json"
          if [ ! -f "$REPORT" ]; then
            echo "ERROR: backtest_report.json not generated"
            exit 1
          fi
          SIZE=$(wc -c < "$REPORT")
          if [ "$SIZE" -lt 500 ]; then
            echo "ERROR: backtest_report.json is only $SIZE bytes (expected >500)"
            cat "$REPORT"
            exit 1
          fi
          echo "Backtest report validated: $SIZE bytes"
          python3 -c "
          import json
          with open('$REPORT') as f:
              r = json.load(f)
          h = r.get('headline', {})
          # CIO v17: presence-of-key validation (not 'is not None'). The
          # script always emits buy_count_t7=0 with status='no_data' when
          # Phase 1 produces nothing — the workflow should NOT fail on
          # data drought, only on schema regression.
          assert 'buy_count_t7' in h, 'Missing buy_count_t7 schema'
          assert 'signal_backtest_status' in h, 'Missing status field'
          status = h.get('signal_backtest_status', 'unknown')
          print(f'Phase 1 status: {status}')
          print(f'BUY T+7: {h.get(\"buy_hit_rate_t7\")}% (n={h.get(\"buy_count_t7\")})')
          print(f'SELL T+7: {h.get(\"sell_hit_rate_t7\")}% (n={h.get(\"sell_count_t7\")})')
          if status == 'no_data':
              print('NOTE: signal backtest had no data this run — workflow continues for downstream calibration phases.')
          "

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Commit backtest outputs
        run: |
          git add yahoofinance/output/backtest_results.csv || true
          git add yahoofinance/output/backtest_summary.csv || true
          git add yahoofinance/output/backtest_threshold_report.csv || true
          git add yahoofinance/output/backtest_report.json || true
          git add data/committee/action_log.jsonl || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COMMIT_DATE=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "Weekly backtest - $COMMIT_DATE

          - Signal hit rates updated
          - Threshold analysis refreshed

          Auto-generated by weekly-backtest workflow"

            PUSH_SUCCESS=false
            for i in 1 2 3; do
              echo "Push attempt $i..."
              if git pull --rebase origin master && git push; then
                PUSH_SUCCESS=true
                break
              fi
              echo "Attempt $i failed, retrying in 5 seconds..."
              sleep 5
            done
            if [ "$PUSH_SUCCESS" = false ]; then
              echo "ERROR: All push attempts failed."
              exit 1
            fi
            echo "Backtest results committed and pushed"
          fi

      - name: Upload backtest artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: backtest-${{ github.run_id }}
          path: |
            yahoofinance/output/backtest_results.csv
            yahoofinance/output/backtest_summary.csv
            yahoofinance/output/backtest_threshold_report.csv
            yahoofinance/output/backtest_report.json
          retention-days: 90
