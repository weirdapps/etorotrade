name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud:
    if: ${{ !github.event.repository.private }}
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Full history for SonarCloud blame

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: '2.4.0'
          plugins: 'poetry-plugin-export==1.10.0'

      - name: Export production+dev requirements (hashed)
        run: poetry export --extras dev -f requirements.txt -o /tmp/req.txt

      - name: Install dependencies (production + dev)
        continue-on-error: true
        run: |
          python -m pip install --only-binary :all: --upgrade pip
          pip install --only-binary :all: --require-hashes -r /tmp/req.txt
          pip install --only-binary :all: pytest==9.0.3 pytest-cov==7.1.0

      - name: Check for tests
        id: check-tests
        run: |
          if [ -d tests ] || [ -d test ] || [ -d __tests__ ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "::notice::No tests directory found — SonarCloud will scan without coverage"
          fi

      - name: Run tests with coverage
        if: steps.check-tests.outputs.has_tests == 'true'
        continue-on-error: true
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing || true

      - name: Check for SonarCloud token
        id: check-sonar
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::notice::SONAR_TOKEN not configured — skipping SonarCloud scan"
          fi

      - name: SonarCloud Scan
        if: steps.check-sonar.outputs.has_token == 'true'
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
