name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud:
    if: ${{ !github.event.repository.private }}
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarCloud blame

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e . 2>/dev/null || pip install -e ".[dev]" 2>/dev/null || pip install -e ".[test]" 2>/dev/null || true
          fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt || true; fi
          pip install pytest pytest-cov

      - name: Check for tests
        id: check-tests
        run: |
          if [ -d tests ] || [ -d test ] || [ -d __tests__ ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "::notice::No tests directory found — SonarCloud will scan without coverage"
          fi

      - name: Run tests with coverage
        if: steps.check-tests.outputs.has_tests == 'true'
        continue-on-error: true
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing || true

      - name: Check for SonarCloud token
        id: check-sonar
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::notice::SONAR_TOKEN not configured — skipping SonarCloud scan"
          fi

      - name: SonarCloud Scan
        if: steps.check-sonar.outputs.has_token == 'true'
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
