name: Daily Trading Signals

on:
  schedule:
    # Run at 22:00 UTC daily (after US market close at 21:00 UTC).
    # 00:00 Athens (winter) / 01:00 (summer). The market scan is sharded across
    # parallel jobs so each finishes well under GitHub's hard 6h per-job cap;
    # the merge job recombines the slices, derives buy/sell/hold, and commits.
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual triggering

# Prevent multiple runs from overlapping
concurrency:
  group: daily-signals
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — scan the universe in parallel shards, each safely under the 6h cap.
  # Pure compute: no secrets, no push. Each shard uploads its slice as an artifact.
  # ---------------------------------------------------------------------------
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # read-only — shards never push (least privilege per S8264)
    timeout-minutes: 330  # 5.5h — under GitHub's hard 6h hosted-runner cap, so a
                          # genuinely stuck shard fails cleanly instead of being
                          # opaquely killed at 6h.
    env:
      SHARD_COUNT: "6"  # MUST equal the length of matrix.shard below
    strategy:
      fail-fast: false  # one slow/failed shard shouldn't abort the others
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install production deps (hashed lockfile)
        run: |
          pip install --only-binary :all: --require-hashes -r requirements-lock.txt

      - name: Validate configuration
        run: python trade.py --validate-config

      - name: Run market/eToro signals for this shard (trade e)
        env:
          SHARD_INDEX: ${{ matrix.shard }}  # SHARD_COUNT inherited from job env
        run: |
          echo "Scanning shard ${SHARD_INDEX}/${SHARD_COUNT}..."
          python trade.py -o e
          mv yahoofinance/output/etoro.csv "etoro_shard_${SHARD_INDEX}.csv"
          echo "Shard ${SHARD_INDEX} complete: $(wc -l < etoro_shard_${SHARD_INDEX}.csv) lines"

      - name: Upload shard output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: etoro-shard-${{ matrix.shard }}
          path: etoro_shard_${{ matrix.shard }}.csv
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Stage 2 — merge shard slices into etoro.csv, refresh portfolio, derive
  # buy/sell/hold, health-check, and commit. Needs secrets + write; runs once,
  # only after every shard succeeds.
  # ---------------------------------------------------------------------------
  merge:
    runs-on: ubuntu-latest
    needs: scan
    timeout-minutes: 45
    permissions:
      contents: write  # Required for git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          token: ${{ secrets.PUSH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install production deps (hashed lockfile)
        run: |
          pip install --only-binary :all: --require-hashes -r requirements-lock.txt

      - name: Validate configuration
        run: python trade.py --validate-config

      - name: Download shard outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: etoro-shard-*
          path: shards
          merge-multiple: true

      - name: Merge shards into etoro.csv
        run: |
          echo "Merging shard slices..."
          python scripts/merge_shards.py --shard-dir shards --output yahoofinance/output/etoro.csv
          echo "Merge complete: $(wc -l < yahoofinance/output/etoro.csv) lines"

      - name: Download fresh portfolio from eToro
        env:
          ETORO_API_KEY: ${{ secrets.ETORO_API_KEY }}
          ETORO_USER_KEY: ${{ secrets.ETORO_USER_KEY }}
          ETORO_USERNAME: ${{ secrets.ETORO_USERNAME }}
        run: |
          echo "Downloading portfolio from eToro..."
          python trade.py -o p -t n
          echo "Portfolio download complete"

      - name: Capture portfolio snapshot for P&L tracking
        run: |
          SNAPSHOT_DIR="yahoofinance/snapshots"
          mkdir -p "$SNAPSHOT_DIR"
          DATE=$(date -u +'%Y-%m-%d')
          if [ -f yahoofinance/input/portfolio.csv ]; then
            cp yahoofinance/input/portfolio.csv "$SNAPSHOT_DIR/positions_${DATE}.csv"
            echo "Snapshot saved: $SNAPSHOT_DIR/positions_${DATE}.csv"
          else
            echo "WARNING: No input portfolio.csv to snapshot"
          fi

      - name: Run portfolio signals (trade p)
        run: |
          echo "Running portfolio analysis..."
          python trade.py -o p
          echo "Portfolio signals complete"

      - name: Generate filtered trade files (buy/sell/hold)
        run: |
          echo "Generating BUY opportunities..."
          python trade.py -o t -t b
          echo "Generating SELL opportunities..."
          python trade.py -o t -t s
          echo "Generating HOLD opportunities..."
          python trade.py -o t -t h
          echo "Trade filtering complete"

      - name: Capture signal performance (T+7 follow-up)
        run: |
          echo "Running signal performance capture..."
          python -c "
          from trade_modules.signal_performance import run_performance_capture
          run_performance_capture()
          "
          echo "Signal performance capture complete"

      - name: Health check - verify output files
        run: |
          echo "Verifying output files..."
          # These files must always have header + data rows
          for file in portfolio.csv etoro.csv; do
            filepath="yahoofinance/output/$file"
            if [ ! -f "$filepath" ]; then
              echo "ERROR: Missing output file: $filepath"
              exit 1
            fi
            rows=$(wc -l < "$filepath")
            echo "  $file: $rows lines"
            if [ "$rows" -lt 2 ]; then
              echo "ERROR: $filepath has fewer than 2 lines (header + data)"
              exit 1
            fi
          done
          # Filtered files may legitimately have only a header (e.g. no SELL signals)
          for file in buy.csv sell.csv hold.csv; do
            filepath="yahoofinance/output/$file"
            if [ ! -f "$filepath" ]; then
              echo "ERROR: Missing output file: $filepath"
              exit 1
            fi
            rows=$(wc -l < "$filepath")
            echo "  $file: $rows lines (header-only OK)"
          done
          echo "All output files verified"

      - name: Regenerate skip list for next run
        run: |
          echo "Regenerating yfinance skip list..."
          python scripts/generate_skip_list.py --min-analysts 3
          echo "Skip list regenerated"

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Commit portfolio and signal outputs
        run: |
          # Add input portfolio (refreshed from eToro)
          git add yahoofinance/input/portfolio.csv || true

          # Add output files
          git add yahoofinance/output/*.csv || true

          # Add skip list (regenerated after each run)
          git add yahoofinance/input/yfinance_skip.csv || true

          # Add portfolio snapshot for P&L tracking
          git add yahoofinance/snapshots/*.csv || true

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COMMIT_DATE=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "Daily signals - $COMMIT_DATE

          - Portfolio refreshed from eToro
          - Signals regenerated

          Auto-generated by daily-signals workflow"

            # Push with retry (fail step if all attempts fail)
            PUSH_SUCCESS=false
            for i in 1 2 3; do
              echo "Push attempt $i..."
              git rebase --abort 2>/dev/null || true
              if git pull --rebase -X ours origin master && git push; then
                PUSH_SUCCESS=true
                break
              fi
              echo "Attempt $i failed, retrying in 10 seconds..."
              sleep 10
            done
            if [ "$PUSH_SUCCESS" = false ]; then
              echo "ERROR: All push attempts failed. Signal data will be stale!"
              exit 1
            fi
            echo "Portfolio and signals committed and pushed"
          fi

      - name: Upload portfolio and signal outputs as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: signals-${{ github.run_id }}
          path: |
            yahoofinance/input/portfolio.csv
            yahoofinance/output/portfolio.csv
            yahoofinance/output/etoro.csv
            yahoofinance/output/buy.csv
            yahoofinance/output/sell.csv
            yahoofinance/output/hold.csv
          retention-days: 30

  # Failure notification (fires if any shard or the merge fails)
  notify-failure:
    runs-on: ubuntu-latest
    needs: [scan, merge]
    if: failure()
    permissions:
      contents: read
      issues: write  # Required for creating failure issues
    steps:
      - name: Create failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;
            const date = new Date().toISOString().split('T')[0];

            // Check for existing open issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'signals-failure,automated'
            });

            const existingIssue = issues.find(issue =>
              issue.title.includes('Daily Signals Failed')
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## Another failure occurred\n\n**Date**: ${date}\n**Run**: ${runUrl}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Daily Signals Failed - ${date}`,
                body:
                  `## Daily Trading Signals Generation Failed\n\n` +
                  `**Date**: ${date}\n**Workflow Run**: ${runUrl}\n\n` +
                  `### Common Issues\n` +
                  `- Yahoo Finance API rate limiting\n` +
                  `- Network timeouts\n` +
                  `- Configuration validation failure\n\n` +
                  `---\n*Auto-created by signals failure alerting*`,
                labels: ['signals-failure', 'automated', 'bug']
              });
            }
