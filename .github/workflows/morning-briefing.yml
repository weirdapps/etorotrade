name: Morning Briefing

on:
  schedule:
    # 08:00 UTC daily (10:00 Athens winter, 11:00 Athens summer)
    # Signals complete by ~02:00 UTC, census by ~03:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Manual trigger for testing

# Prevent multiple runs from overlapping
concurrency:
  group: morning-briefing
  cancel-in-progress: true

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout etorotrade
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Checkout etoro_census (data-archive branch)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: weirdapps/etoro_census
          ref: data-archive
          path: etoro_census

      - name: Set up Python 3.11
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/briefing/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/briefing/requirements.txt

      - name: Generate and send briefing
        working-directory: scripts/briefing
        env:
          VERTEX_PROJECT_ID: nbg-ae739221-53d9-4fe0-bac0
          VERTEX_REGION: europe-west1
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: python main.py

      - name: Upload briefing HTML as artifact
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: briefing-${{ github.run_id }}
          path: yahoofinance/output/briefing-*.html
          retention-days: 30

  # Failure notification
  notify-failure:
    runs-on: ubuntu-latest
    needs: briefing
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().split('T')[0];

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'briefing-failure,automated'
            });

            const existingIssue = issues.find(issue =>
              issue.title.includes('Morning Briefing Failed')
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## Another failure occurred\n\n**Date**: ${date}\n**Run**: ${runUrl}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Morning Briefing Failed - ${date}`,
                body: `## Morning Briefing Generation Failed\n\n**Date**: ${date}\n**Workflow Run**: ${runUrl}\n\n### Common Issues\n- Vertex AI authentication failure\n- Gmail OAuth token expired\n- Census data not available\n- Network timeouts\n\n---\n*Auto-created by morning-briefing workflow*`,
                labels: ['briefing-failure', 'automated', 'bug']
              });
            }
