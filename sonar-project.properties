# SonarCloud configuration for Python projects

sonar.organization=weirdapps
sonar.projectKey=weirdapps_etorotrade
sonar.projectName=etorotrade

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.python.version=3.11

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=\
  **/tests/**,\
  **/.venv/**,\
  **/venv/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/*.egg-info/**,\
  **/dist/**,\
  **/build/**

# Test exclusions
sonar.test.exclusions=\
  **/tests/**,\
  **/*_test.py,\
  **/test_*.py
