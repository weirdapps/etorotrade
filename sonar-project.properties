# SonarCloud configuration for Python projects

sonar.organization=weirdapps
sonar.projectKey=weirdapps_etorotrade
sonar.projectName=etorotrade

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.python.version=3.11

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=\
  **/tests/**,\
  **/.venv/**,\
  **/venv/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/*.egg-info/**,\
  **/dist/**,\
  **/build/**,\
  scripts/**,\
  trade_modules/opportunity_scanner_iran.py,\
  trade_modules/committee_html.py,\
  trade_modules/trade_cli.py,\
  trade_modules/committee_scorecard.py,\
  trade_modules/committee_synthesis.py,\
  trade_modules/committee_backtester.py,\
  trade_modules/sentiment_analyzer.py,\
  trade_modules/backtest_engine.py,\
  yahoofinance/data/download.py,\
  yahoofinance/api/providers/**,\
  yahoofinance/presentation/**

# Test exclusions
sonar.test.exclusions=\
  **/tests/**,\
  **/*_test.py,\
  **/test_*.py
