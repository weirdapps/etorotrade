# CIO v20.0: Regional calibration based on backtest hit rates
# US T+7: 53.9%, Europe T+7: 38.6%, HK T+7: 66.4%
regional_adjustments:
  europe:
    # European markets have sparser analyst coverage and lower hit rates
    buy_pct_discount: -5        # Allow 5pp lower %B (sparser coverage)
    dividend_bonus: true        # Count dividend yield as return supplement
    suffixes: ['.DE', '.L', '.PA', '.AS', '.MI', '.MC', '.BR', '.OL', '.ST', '.HE', '.CO']
  hong_kong:
    # HK has highest hit rate - slightly more favorable
    suffixes: ['.HK']
  japan:
    # Japanese market specific
    buy_pct_discount: -5        # Lower coverage threshold
    suffixes: ['.T']
  us:
    # Baseline - no adjustment
    adjustments: none

position_sizing:
  base_position_size: 2500
  # Risk management limits
  max_position_pct: 5.0           # Max 5% of portfolio in single position (reduced from ~8.89%)
  max_position_usd: 22500         # Max USD in single position (reduced from 40000)
  max_positions: 30               # Max number of positions
  max_sector_pct: 25.0            # Max 25% sector concentration
  tier_multipliers:
    mega: 5
    large: 4
    mid: 3
    small: 2
    micro: 1
output:
  save_to_csv: true
  save_to_html: true
  display_colors: true
  max_display_rows: 99999999
performance:
  max_concurrent_requests: 20  # Increased from 15 for better throughput
  request_timeout_seconds: 30
  retry_attempts: 3
  batch_size: 25  # Tickers per batch
logging:
  level: INFO
  file: logs/trading_analysis.log
  console: true

# Cache Configuration
# Disk cache persists across runs for significant speed improvement
cache:
  enabled: true
  enable_disk: true  # Enable disk cache for persistence across runs
  default_ttl: 14400  # 4 hours for non-price data
  max_items: 15000  # Max items in memory cache
  disk_cache_dir: yahoofinance/data/cache
  # Price fields are NEVER cached - see yahoofinance/core/config.py FIELD_CACHE_CONFIG

# Crypto and Non-Equity Asset Configuration
# Momentum thresholds for crypto assets (no analyst coverage)
crypto_momentum:
  # Major crypto (BTC, ETH) - higher thresholds due to relative stability
  major:
    buy_threshold: 85    # % of 52-week high required for BUY
    hold_threshold: 60   # % of 52-week high - below this triggers SELL
    tickers: ['BTC-USD', 'ETH-USD']
  # Altcoins - slightly more aggressive thresholds
  altcoins:
    buy_threshold: 85    # % of 52-week high required for BUY
    hold_threshold: 55   # % of 52-week high - below this triggers SELL

# Bitcoin proxy stock configuration
# Stocks whose value is primarily tied to Bitcoin holdings or mining
bitcoin_proxy:
  momentum_buy_threshold: 70      # % of 52-week high required for BUY consideration
  momentum_sell_threshold: 35     # % of 52-week high - below this triggers SELL
  min_buy_pct_override: 60        # Relaxed analyst buy% threshold
  require_above_200dma: true      # Require above 200DMA for BUY signal
  max_beta: 4.0                   # Cap extreme volatility - filter out beta > 4.0
  max_short_interest: 10.0        # Cap extreme short interest - filter out SI > 10%

# IPO Grace Period Configuration
# Recent IPOs exhibit extreme volatility that triggers false SELL signals
# Apply relaxed criteria during grace period
ipo_grace_period:
  enabled: true
  grace_period_months: 12         # Months after IPO to apply relaxed criteria
  relaxed_momentum_threshold: 40  # More lenient 52W% threshold (vs 50% standard)
  ignore_analyst_momentum: true   # Ignore AM column (analyst momentum) for recent IPOs
  # Known recent IPOs (add tickers here for manual override)
  # Format: TICKER: IPO_DATE (YYYY-MM-DD)
  known_ipos:
    ETOR: '2025-05-14'           # eToro Group - May 2025 IPO
    ARM: '2023-09-14'            # ARM Holdings - September 2023 IPO
    BIRK: '2023-10-11'           # Birkenstock - October 2023 IPO

# Enhanced Signal Scoring Framework
# Feature flag to enable multi-factor scoring (set to false to use legacy ANY-trigger logic)
use_signal_scoring: true

# Default scoring configuration (used if region-tier specific config not found)
default_sell_scoring:
  # Score threshold (0-100) for SELL signal
  score_threshold: 65
  # Hard triggers (bypass scoring - immediate SELL)
  hard_trigger_upside: -5          # Below target by 5%+
  hard_trigger_buy_pct: 35         # Less than 35% buy
  # Soft triggers (combined condition - SELL when BOTH conditions met)
  soft_trigger_upside: 0           # Negative upside (below target)
  soft_trigger_buy_pct: 50         # Less than 50% buy consensus
  # Quality override (bypass SELL - protect strong stocks)
  quality_override_buy_pct: 85     # 85%+ analyst buy
  quality_override_upside: 20      # 20%+ upside
  # CIO Review S2: Rebalanced weights - reduced analyst (EXRET tautology),
  # increased fundamentals and momentum (orthogonal factors)
  # Original: analyst=0.35, momentum=0.25, valuation=0.20, fundamental=0.20
  weight_analyst: 0.20   # Reduced from 0.25 — analyst sentiment includes EXRET tautology
  weight_momentum: 0.25
  weight_valuation: 0.20  # Increased from 0.15 — PET is academically strongest value signal
  weight_fundamental: 0.25
  weight_analyst_momentum: 0.10

default_buy_scoring:
  enabled: true
  # CIO Review S2: Rebalanced weights - reduced upside/consensus dependency,
  # increased fundamental weight (FCF yield, ROE are genuinely orthogonal)
  # Original: upside=0.30, consensus=0.25, momentum=0.20, valuation=0.15, fundamental=0.10
  weight_upside: 0.22
  weight_consensus: 0.13  # Reduced from 0.18 — buy% is contrarian indicator, floor role only
  weight_momentum: 0.20
  weight_valuation: 0.18  # Increased from 0.13 — PET is academically strongest value signal
  weight_fundamental: 0.17
  weight_analyst_momentum: 0.10

# === CIO REVIEW: NEW CONFIGURATION SECTIONS ===

# Liquidity Filter Configuration (CIO Review S5)
# Minimum Average Daily Dollar Volume by tier
liquidity:
  enabled: true
  min_adv:
    MEGA: 50000000      # $50M
    LARGE: 20000000     # $20M
    MID: 10000000       # $10M
    SMALL: 5000000      # $5M
    MICRO: 2000000      # $2M
  # Estimated spread costs in basis points (for cost-adjusted returns)
  spread_bps:
    MEGA: 2
    LARGE: 5
    MID: 10
    SMALL: 20
    MICRO: 40
  etoro_overnight_annual_rate: 0.064

# Conviction-Based Position Sizing (CIO Review E1 + M2)
conviction_sizing:
  enabled: true
  # Conviction score → position size multiplier
  multipliers:
    - {min_score: 90, max_score: 100, multiplier: 1.00}
    - {min_score: 80, max_score: 89, multiplier: 0.90}
    - {min_score: 70, max_score: 79, multiplier: 0.80}
    - {min_score: 60, max_score: 69, multiplier: 0.65}
    - {min_score: 50, max_score: 59, multiplier: 0.50}
    - {min_score: 0, max_score: 49, multiplier: 0.35}
  # Minimum cost-adjusted return to proceed with position (%)
  min_cost_adjusted_return: 1.0

# Earnings Proximity (CIO Review M4)
earnings_proximity:
  enabled: true
  imminent_days: 7         # Force HOLD within this many days of earnings
  recent_days: 5           # Days after earnings where signal may be adjusting
  post_earnings_boost_days: 30  # Post-earnings signals get conviction boost

# Sector Rotation Detection (CIO Review M6)
sector_rotation:
  enabled: true
  lookback_days: 30         # Days to compare between periods
  threshold_pp: 15          # Minimum BUY% change to flag rotation (percentage points)
  min_sector_stocks: 3      # Minimum stocks in sector to be meaningful

# Data Freshness (CIO Review M5)
data_freshness:
  fresh_days: 30            # < 30 days: no penalty
  aging_days: 60            # 30-60 days: 25% penalty
  stale_days: 90            # 60-90 days: 50% penalty
  # Beyond stale_days: signal becomes INCONCLUSIVE

