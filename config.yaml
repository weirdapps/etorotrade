data:
  portfolio_csv: yahoofinance/input/portfolio.csv
  cache_enabled: true
  cache_ttl_hours: 4  # Max 4 hours for non-price data (prices always fresh)
tier_thresholds:
  mega_tier_min: 500000000000
  large_tier_min: 100000000000
  mid_tier_min: 10000000000
  small_tier_min: 2000000000
universal_thresholds:
  # Market cap gate: hard floor at $2B, tiered analyst requirements
  min_market_cap: 2000000000  # $2B hard floor - no stocks below this
  small_cap_threshold: 5000000000  # $5B - boundary between small and standard
  small_cap_min_analysts: 6  # $2-5B requires 6+ analysts (institutional interest)
  min_analyst_count: 4  # $5B+ requires 4+ analysts (standard)
  min_price_targets: 4  # Standard price target requirement
us_mega:
  buy:
    # US MEGA: More lenient thresholds - large liquid names with strong coverage
    min_upside: 10
    min_buy_percentage: 60  # Quality floor (was 75) — buy% is contrarian indicator above floor
    min_beta: 0.2  # Data quality filter — beta≈0 means Yahoo couldn't calculate it
    max_beta: 3
    min_forward_pe: 0.5
    max_forward_pe: 60
    min_trailing_pe: 0.5
    max_trailing_pe: 90
    max_peg: 999.0  # Effectively disabled - PEG has no predictive value (ratio 0.94x)
    max_short_interest: 2
    min_analysts: 8  # Reduced from 12 - MEGA caps are well-covered even with fewer analysts
    min_analysts_earnings: 5  # Lower threshold for Type E ratings (post-earnings, more relevant)
    min_price_targets: 6  # Reduced from 8
    min_roe: 8.0
    max_debt_equity: 300.0  # Increased from 200 - payment networks (V, MA) operate with high leverage by design
    min_fcf_yield: -5.0  # Changed from 0.5 - growth companies may have negative FCF during expansion
    # min_revenue_growth removed — no predictive power for forward returns (R²=5%, academic evidence)
    min_pct_from_52w_high: 45  # Reduced from 65 - value opportunities often trade far from highs
    max_upside_buy: 100  # Filter unrealistic targets (>100% upside suggests stale/outlier estimates)
    max_target_dispersion: 150  # Tier-scaled: mega cap (120→150)
    require_above_200dma: false  # Relaxed for MEGA caps - quality stocks may dip below temporarily
    min_analyst_momentum: -10  # Relaxed from -8 - allow more AM flexibility for MEGA caps
    quality_override: true  # Allow positive AM to lower analyst threshold by 1
    max_pe_vs_sector: 1.5
  sell:
    # Fully Valued thresholds - stocks at fair value with high consensus are not SELL
    fully_valued_upside_threshold: 3.0
    fully_valued_buy_pct_threshold: 80.0
    max_upside: 0
    min_buy_percentage: 50
    min_beta: 3.5
    min_forward_pe: 80
    min_trailing_pe: 170
    min_peg: 5.5
    min_short_interest: 4
    min_roe: 5.0
    max_debt_equity: 250.0
    max_pct_from_52w_high: 50
    max_analyst_momentum: -20
    max_pe_vs_sector: 2.0
us_large:
  buy:
    # US LARGE: More lenient thresholds - good coverage, liquid names
    min_upside: 12
    min_buy_percentage: 63  # Quality floor (was 77) — buy% is contrarian indicator above floor
    min_beta: 0.2  # Data quality filter
    max_beta: 2.5
    min_forward_pe: 0.5
    max_forward_pe: 55
    min_trailing_pe: 0.5
    max_trailing_pe: 85
    max_peg: 999.0  # Effectively disabled - PEG has no predictive value (ratio 0.94x)
    max_short_interest: 3.5  # Increased from 2.25 - research shows SI only predictive for distressed stocks
    min_analysts: 8  # Reduced from 10 - quality coverage exists with 8+ analysts
    min_analysts_earnings: 5  # Lowered from 6 - adds TMO ($204B, 100% buy, 22% upside)
    min_price_targets: 5  # Reduced from 6
    min_roe: 14.0  # Raised from 8.0 — backtest shows +10.4% hit rate (n=103)
    max_debt_equity: 175.0  # Increased from 150 - large caps can carry moderate debt
    min_fcf_yield: -3.0  # Changed from 0.25 - growth companies may have negative FCF
    min_pct_from_52w_high: 60  # Increased from 50 - avoid deep drawdowns like INTU at 55%
    max_upside_buy: 100  # Filter unrealistic targets (>100% upside suggests stale/outlier estimates)
    max_target_dispersion: 130  # Tier-scaled: large cap (120→130)
    require_above_200dma: false  # Relaxed for LARGE caps - quality stocks may dip below temporarily
    min_analyst_momentum: -10  # Relaxed from -8 - allow more AM flexibility for LARGE caps
    quality_override: true  # Allow positive AM to lower analyst threshold by 1
    max_pe_vs_sector: 1.5
  sell:
    # Fully Valued thresholds - stocks at fair value with high consensus are not SELL
    fully_valued_upside_threshold: 3.0
    fully_valued_buy_pct_threshold: 80.0
    max_upside: -3.5  # Tightened from 5 — backtest shows +26.2% hit rate (n=146)
